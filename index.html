<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Garden Map — Front Yard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #f0ede8; color: #1c1c1e; -webkit-font-smoothing: antialiased; }
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

    /* ── TITLE BANNER ── */
    #title-banner {
      background: #fff; border-bottom: 1px solid #e5e5ea; flex-shrink: 0;
      padding: 6px 16px 4px;
      padding-top: max(6px, env(safe-area-inset-top, 0px));
      text-align: center;
    }
    #title-banner h1 { font-size: 18px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: #2D5236; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    #title-banner p  { font-size: 10px; color: #8e8e93; letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }

    /* ── TOOLBAR ── */
    #toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; background: #fff; border-bottom: 1px solid #e5e5ea;
      flex-shrink: 0; gap: 8px;
    }
    .toolbar-right { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      padding: 7px 14px; border-radius: 22px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 600; min-height: 36px; min-width: 36px;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .btn:active { opacity: .7; }
    .btn-icon { padding: 7px; border-radius: 50%; background: #f2f2f7; font-size: 16px; }
    .btn-green  { background: #34c759; color: #fff; }
    .btn-orange { background: #ff9500; color: #fff; }
    .btn-blue   { background: #007aff; color: #fff; }
    .show-count { font-size: 12px; color: #636366; font-weight: 500; }

    /* ── MAP AREA ── */
    #map-wrap {
      flex: 1; position: relative; overflow: hidden;
      background: #f0ede8; display: flex; align-items: center; justify-content: center;
      padding: 10px;
    }
    #map-card {
      background: #fff; border-radius: 14px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.13); width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #map-svg { display: block; touch-action: none; width: 100%; height: 100%; }
    .plant-el { cursor: pointer; }
    .plant-el.dimmed { opacity: .07; pointer-events: none; }
    .plant-el.selected ellipse, .plant-el.selected circle { filter: drop-shadow(0 0 .18px #000); }
    .plant-label { pointer-events: none; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .plant-label.dimmed { opacity: .07; }

    #edit-banner {
      display: none; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(255,149,0,.92); color: #fff; padding: 5px 14px; border-radius: 14px;
      font-size: 12px; font-weight: 700; pointer-events: none; white-space: nowrap; z-index: 5;
    }
    body.edit-mode #edit-banner { display: block; }

    /* ── BOTTOM SHEET ── */
    .sheet {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: #fff; border-radius: 18px 18px 0 0;
      box-shadow: 0 -6px 32px rgba(0,0,0,.16);
      transform: translateY(100%); transition: transform .32s cubic-bezier(.32,.72,0,1);
      max-height: 90vh; display: flex; flex-direction: column;
      padding-bottom: max(18px, env(safe-area-inset-bottom, 0px));
    }
    .sheet.open { transform: translateY(0); }
    .sheet-pull { width: 38px; height: 5px; background: #d1d1d6; border-radius: 3px; margin: 10px auto 2px; flex-shrink: 0; }
    .sheet-hdr { display: flex; align-items: center; justify-content: space-between; padding: 6px 16px 10px; flex-shrink: 0; }
    .sheet-title { font-size: 19px; font-weight: 700; }
    .sheet-x { width: 30px; height: 30px; background: #e5e5ea; border-radius: 50%; border: none; cursor: pointer; font-size: 14px; color: #636366; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .sheet-body { overflow-y: auto; padding: 0 16px 8px; flex: 1; -webkit-overflow-scrolling: touch; }

    /* ── INFO CARD ── */
    .card-photo { width: 100%; max-height: 220px; object-fit: contain; border-radius: 12px; margin-bottom: 12px; background: #f0ede8; display: block; }
    .card-photo-ph { width: 100%; height: 100px; display: flex; align-items: center; justify-content: center; background: #f2f2f7; border-radius: 12px; margin-bottom: 12px; font-size: 46px; }
    .card-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; }
    .badge-type { color: #fff; }
    .badge-native { background: #e6f4ea; color: #2D6A4F; }
    .badge-autumn { background: #fff3e0; color: #e65100; }
    .badge-winter-ev { background: #e8f5e9; color: #2D5236; }
    .badge-winter-st { background: #ede7f6; color: #4527a0; }
    .card-name { font-size: 21px; font-weight: 700; margin-bottom: 2px; }
    .card-sci  { font-size: 14px; color: #636366; font-style: italic; margin-bottom: 12px; }
    .attrs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .attr { background: #f2f2f7; border-radius: 11px; padding: 9px 11px; }
    .attr-lbl { font-size: 10px; color: #8e8e93; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .attr-val { font-size: 13px; font-weight: 600; }
    .soil-box { background: #faf5ec; border-radius: 11px; padding: 9px 12px; margin-bottom: 12px; }
    .soil-lbl { font-size: 10px; color: #8e8e93; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .soil-val { font-size: 13px; color: #3a3a3c; }
    .bloom-box { background: #f2f2f7; border-radius: 11px; padding: 9px 12px; margin-bottom: 12px; }
    .bloom-lbl { font-size: 10px; color: #8e8e93; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .bloom-bar { display: flex; gap: 2px; }
    .bloom-seg { flex: 1; height: 6px; border-radius: 3px; background: #d1d1d6; }
    .bloom-seg.on { background: #34c759; }
    .bloom-abbrs { display: flex; margin-top: 2px; }
    .bloom-abbr { flex: 1; font-size: 7px; color: #aeaeb2; text-align: center; }
    .card-notes { background: #fff9e6; border-radius: 11px; padding: 9px 12px; margin-bottom: 12px; font-size: 13px; color: #3a3a3c; line-height: 1.5; }
    .card-btns { display: flex; gap: 8px; margin-bottom: 6px; }
    .card-edit-btn { flex: 1; padding: 13px; background: #f2f2f7; color: #007aff; border: none; border-radius: 13px; font-size: 15px; font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .card-del-btn  { flex: 1; padding: 13px; background: #fff2f2; color: #ff3b30; border: 1.5px solid #ffb3af; border-radius: 13px; font-size: 15px; font-weight: 700; cursor: pointer; display: none; -webkit-tap-highlight-color: transparent; }
    body.edit-mode .card-del-btn { display: block; }

    /* ── FILTER SHEET ── */
    .filt-counter { font-size: 13px; color: #636366; font-weight: 500; margin-bottom: 14px; }
    .fsec { border: 1px solid #e5e5ea; border-radius: 13px; margin-bottom: 12px; overflow: hidden; }
    .fsec-hdr { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; background: #fafafa; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .fsec-hdr-left { font-size: 15px; font-weight: 700; }
    .fsec-hdr-right { display: flex; align-items: center; gap: 8px; }
    .fsec-cnt { font-size: 12px; color: #8e8e93; font-weight: 500; }
    .fsec-chev { font-size: 12px; color: #8e8e93; transition: transform .2s; }
    .fsec-chev.open { transform: rotate(180deg); }
    .fsec-body { padding: 8px 14px 12px; display: none; }
    .fsec-body.open { display: block; }
    .fsec-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f2f2f7; }
    .fsec-row:last-child { border-bottom: none; }
    .fsec-row label { display: flex; align-items: center; gap: 9px; cursor: pointer; flex: 1; font-size: 14px; -webkit-tap-highlight-color: transparent; }
    .fsec-row input[type=checkbox] { width: 18px; height: 18px; accent-color: #007aff; flex-shrink: 0; cursor: pointer; }
    .type-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .fsec-all { display: flex; gap: 8px; margin-bottom: 8px; }
    .fsec-all button { padding: 4px 10px; border-radius: 8px; border: 1px solid #d1d1d6; background: #fff; font-size: 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .species-search { width: 100%; padding: 8px 12px; border-radius: 10px; border: 1.5px solid #d1d1d6; font-size: 14px; outline: none; background: #f2f2f7; margin-bottom: 8px; }
    .species-search:focus { border-color: #007aff; background: #fff; }
    .species-list { max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .bloom-range { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
    .bloom-sel { flex: 1; padding: 8px 10px; border-radius: 10px; border: 1.5px solid #d1d1d6; font-size: 13px; outline: none; background: #f2f2f7; -webkit-appearance: none; }
    .bloom-sel:focus { border-color: #007aff; }
    #filter-reset { width: 100%; padding: 13px; background: #f2f2f7; border: none; border-radius: 13px; font-size: 15px; color: #636366; font-weight: 600; cursor: pointer; margin-top: 4px; margin-bottom: 8px; }

    /* ── SPECIES PICKER ── */
    #picker { position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,.5); display: none; align-items: flex-end; }
    #picker.open { display: flex; }
    #picker-inner { background: #fff; border-radius: 18px 18px 0 0; width: 100%; max-height: 82vh; display: flex; flex-direction: column; padding-bottom: max(14px, env(safe-area-inset-bottom, 0px)); }
    #picker-srch-wrap { padding: 10px 14px 6px; flex-shrink: 0; }
    #picker-srch { width: 100%; padding: 10px 14px; border-radius: 12px; border: 1.5px solid #d1d1d6; font-size: 16px; outline: none; background: #f2f2f7; }
    #picker-list { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
    .pitem { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f2f2f7; cursor: pointer; gap: 11px; -webkit-tap-highlight-color: transparent; }
    .pitem:active { background: #f2f2f7; }
    .pdot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
    .pname { font-size: 15px; font-weight: 600; }
    .psci  { font-size: 12px; color: #8e8e93; font-style: italic; }
    #picker-new { display: block; margin: 8px 14px; padding: 13px; background: #f2f2f7; border: none; border-radius: 13px; font-size: 15px; color: #007aff; font-weight: 700; text-align: center; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    #picker-cancel { display: block; margin: 0 14px 4px; padding: 13px; background: #ff3b30; border: none; border-radius: 13px; font-size: 15px; color: #fff; font-weight: 700; text-align: center; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }

    /* ── SPECIES FORM (new + edit) ── */
    #sf-modal { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,.55); display: none; align-items: flex-end; }
    #sf-modal.open { display: flex; }
    #sf-inner { background: #fff; border-radius: 18px 18px 0 0; width: 100%; max-height: 94vh; display: flex; flex-direction: column; padding-bottom: max(14px, env(safe-area-inset-bottom, 0px)); }
    .frow { margin-bottom: 13px; }
    .flbl { display: block; font-size: 13px; font-weight: 700; color: #636366; margin-bottom: 4px; }
    .finput, .fsel { width: 100%; padding: 10px 13px; border-radius: 11px; border: 1.5px solid #d1d1d6; font-size: 15px; outline: none; background: #fff; -webkit-appearance: none; }
    .finput:focus, .fsel:focus { border-color: #007aff; }
    .frow2 { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 13px; }
    .sf-actions { display: flex; gap: 10px; padding: 0 16px; flex-shrink: 0; }
    .sf-save   { flex: 1; padding: 14px; background: #34c759; color: #fff; border: none; border-radius: 13px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .sf-cancel { flex: 1; padding: 14px; background: #f2f2f7; color: #3a3a3c; border: none; border-radius: 13px; font-size: 16px; font-weight: 700; cursor: pointer; }

    /* ── BACKDROP ── */
    #backdrop { position: fixed; inset: 0; z-index: 100; display: none; }
    #backdrop.on { display: block; }

    /* ── RESIZE ROW ── */
    .resize-row { display: flex; gap: 12px; margin: 10px 0 6px; }
    .resize-row label { flex: 1; font-size: 12px; font-weight: 700; color: #636366; text-transform: uppercase; letter-spacing: .4px; display: flex; flex-direction: column; gap: 5px; }
    .resize-row input[type=number] { padding: 8px 10px; border-radius: 10px; border: 1.5px solid #d1d1d6; font-size: 15px; outline: none; background: #fff; width: 100%; -webkit-appearance: none; }
    .resize-row input[type=number]:focus { border-color: #007aff; }

    /* ── BLOOM SLIDER ── */
    #bloom-slider { width: 100%; margin: 8px 0 2px; accent-color: #34c759; cursor: pointer; }
    #bloom-label { text-align: center; font-size: 13px; font-weight: 700; color: #34c759; padding-bottom: 8px; }

    /* ── DATA BACKUP LINKS ── */
    #data-links { display: flex; align-items: center; gap: 6px; justify-content: center; padding: 10px 0 4px; }
    #data-links button { background: none; border: none; color: #8e8e93; font-size: 12px; cursor: pointer; padding: 2px 0; text-decoration: underline; -webkit-tap-highlight-color: transparent; }
    #data-links button:hover { color: #3a3a3c; }
    #data-links span { color: #c7c7cc; font-size: 12px; }

    /* ── SIDEBAR BACK BUTTON ── */
    .sidebar-back-btn { background: none; border: none; color: #007aff; font-size: 14px; font-weight: 600; cursor: pointer; padding: 4px 0; -webkit-tap-highlight-color: transparent; }
    .sidebar-back-btn:hover { text-decoration: underline; }

    /* ── DESKTOP LAYOUT (≥900px) ── */
    @media (min-width: 900px) {
      #app {
        display: grid;
        grid-template-rows: auto auto 1fr;
        grid-template-columns: 270px 1fr;
        grid-template-areas: "title title" "toolbar toolbar" "filter map";
        height: 100vh; height: 100dvh;
        overflow: hidden;
      }
      #title-banner { grid-area: title; }
      #toolbar      { grid-area: toolbar; }
      #filter-sheet {
        grid-area: filter;
        position: static !important; transform: none !important;
        max-height: none; height: 100%; border-radius: 0;
        box-shadow: 1px 0 0 #e5e5ea; overflow: hidden;
        display: flex !important; flex-direction: column;
        padding-bottom: 0; border-top: none;
      }
      #filter-sheet .sheet-body { overflow-y: auto; flex: 1; }
      #filter-sheet .sheet-pull,
      #filter-sheet .sheet-x { display: none; }
      #filter-btn   { display: none; }
      #map-wrap     { grid-area: map; overflow: hidden; }
      #backdrop.on  { display: none; }
      #info-sheet   { display: none !important; }
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Title -->
  <div id="title-banner">
    <h1>Front Yard</h1>
    <p>Planting Bed Map</p>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <span class="show-count" id="show-count">83 plants</span>
    <div class="toolbar-right">
      <button class="btn btn-icon" id="filter-btn" title="Filter" aria-label="Filter"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="8" cy="6" r="2" fill="currentColor" stroke="none"/><circle cx="16" cy="12" r="2" fill="currentColor" stroke="none"/><circle cx="10" cy="18" r="2" fill="currentColor" stroke="none"/></svg></button>
      <button class="btn btn-icon" id="grid-btn" onclick="toggleGrid()" title="Toggle 1ft grid" style="opacity:0.5">⊞</button>
      <button class="btn btn-icon" id="undo-btn" onclick="undo()" title="Undo last move" style="display:none">↩</button>
      <button class="btn btn-blue" id="mode-btn" onclick="toggleMode()">✏️ Edit</button>
    </div>
  </div>

  <!-- Map -->
  <div id="map-wrap">
    <div id="edit-banner">✏️ Edit — tap empty space to add · drag to move</div>
    <div id="map-card">
      <svg id="map-svg" viewBox="-1 -1 17 22" preserveAspectRatio="xMidYMid meet" style="touch-action:none">
        <g id="bg-path" transform="scale(0.003091,0.003119) translate(-511,-395)"
           fill="#e8f0e4" fill-opacity="0.55" stroke="#6a9a6a" stroke-width="28">
          <path d="M511.001 395 5364 395 5364 3608.96 5364 3608.96 5364 6807 4739.8 6807 4739.8 6802.58 4677.38 6799.69C4314.83 6766.04 4007.03 6563.1 3850.06 6278.72L3826.96 6231.62 3823.99 6231.62 3821.9 6226.48C3574.1 5657.18 2980.55 5247.93 2278.28 5215.38L2197.47 5213.52 2197.47 5207.78 2168.48 5208.5C1281.69 5208.5 557.55 4533.29 513.157 3684.21L511.194 3608.96 511.001 3608.96 511.001 3601.53 511 3601.51 511.001 3601.5Z"/>
        </g>
        <g id="grid-g" style="display:none"></g>
        <g id="plants-g"></g>
        <g id="labels-g"></g>
      </svg>
    </div>
  </div>

  <!-- ── FILTER SHEET (inside #app for desktop grid) ── -->
  <div class="sheet" id="filter-sheet">
    <div class="sheet-pull"></div>
    <div class="sheet-hdr">
      <span class="sheet-title">Filter Plants</span>
      <button class="sheet-x" onclick="closeSheet('filter-sheet')">✕</button>
    </div>
    <!-- Filter body -->
    <div class="sheet-body" id="filter-body">
      <div class="filt-counter" id="filt-counter"></div>
      <!-- Type section -->
      <div class="fsec" id="fsec-type">
        <div class="fsec-hdr" onclick="toggleFSec('type')">
          <span class="fsec-hdr-left">Plant Type</span>
          <div class="fsec-hdr-right"><span class="fsec-cnt" id="fsec-type-cnt"></span><span class="fsec-chev" id="fsec-type-chev">▼</span></div>
        </div>
        <div class="fsec-body open" id="fsec-type-body">
          <div class="fsec-all"><button onclick="setAllTypes(true)">All</button><button onclick="setAllTypes(false)">None</button></div>
          <div id="type-checks"></div>
        </div>
      </div>
      <!-- Species section -->
      <div class="fsec" id="fsec-species">
        <div class="fsec-hdr" onclick="toggleFSec('species')">
          <span class="fsec-hdr-left">Species</span>
          <div class="fsec-hdr-right"><span class="fsec-cnt" id="fsec-species-cnt"></span><span class="fsec-chev" id="fsec-species-chev">▼</span></div>
        </div>
        <div class="fsec-body" id="fsec-species-body">
          <div class="fsec-all"><button onclick="setAllSpecies(true)">All</button><button onclick="setAllSpecies(false)">None</button></div>
          <input type="text" class="species-search" id="species-srch" placeholder="Search species…" oninput="filterSpeciesList(this.value)">
          <div class="species-list" id="species-checks"></div>
        </div>
      </div>
      <!-- Bloom date slider -->
      <div class="fsec">
        <div class="fsec-hdr" onclick="toggleFSec('bloom')">
          <span class="fsec-hdr-left">Bloom Date</span>
          <div class="fsec-hdr-right"><span class="fsec-chev open" id="fsec-bloom-chev">▼</span></div>
        </div>
        <div class="fsec-body open" id="fsec-bloom-body">
          <div class="fsec-row" style="border-bottom:none;padding-bottom:2px">
            <label><input type="checkbox" id="bloom-active" onchange="applyFilters()"> Show plants blooming at:</label>
          </div>
          <input type="range" id="bloom-slider" min="0" max="23" value="8"
                 oninput="updateBloomLabel();applyFilters()">
          <div id="bloom-label">Early May</div>
        </div>
      </div>
      <!-- Features -->
      <div class="fsec">
        <div class="fsec-hdr" onclick="toggleFSec('features')">
          <span class="fsec-hdr-left">Season &amp; Features</span>
          <div class="fsec-hdr-right"><span class="fsec-chev" id="fsec-features-chev">▼</span></div>
        </div>
        <div class="fsec-body open" id="fsec-features-body">
          <div class="fsec-row">
            <label><input type="checkbox" id="f-autumn" onchange="applyFilters()"> 🍂 Autumn foliage</label>
          </div>
          <div class="fsec-row">
            <label><input type="checkbox" id="f-wi" onchange="applyFilters()"> 🌿 Has winter interest</label>
          </div>
          <div class="fsec-row">
            <label><input type="checkbox" id="f-native" onchange="applyFilters()"> 🦋 Native plants only</label>
          </div>
        </div>
      </div>
      <!-- Sun / Shade -->
      <div class="fsec">
        <div class="fsec-hdr" onclick="toggleFSec('sun')">
          <span class="fsec-hdr-left">Sun / Shade</span>
          <div class="fsec-hdr-right"><span class="fsec-chev" id="fsec-sun-chev">▼</span></div>
        </div>
        <div class="fsec-body" id="fsec-sun-body">
          <div class="fsec-all"><button onclick="setAllSun(true)">All</button><button onclick="setAllSun(false)">None</button></div>

// VIEWPORT / ZOOM STATE
// ─────────────────────────────────────────────────────
const BASE_LABEL = window.innerWidth <= 768 ? 0.40 : 0.40;
const VB = { W:17, H:22, cx:7.5, cy:10, scale:1 };
let _pinch = null, _mapPan = null, _lastTap = 0;

function updateViewBox() {
  const w = VB.W/VB.scale, h = VB.H/VB.scale;
  document.getElementById('map-svg').setAttribute('viewBox',
    `${VB.cx - w/2} ${VB.cy - h/2} ${w} ${h}`);
  document.querySelectorAll('.plant-label').forEach(t =>
    t.setAttribute('font-size', BASE_LABEL/VB.scale));
}

function clampView() {
  const hw = (VB.W/VB.scale)/2, hh = (VB.H/VB.scale)/2;
  VB.cx = Math.max(-1 + hw, Math.min(16 - hw, VB.cx));
  VB.cy = Math.max(-1 + hh, Math.min(21 - hh, VB.cy));
}

// ─────────────────────────────────────────────────────
let S = {
  catalog: [], layout: [],
  meta: { gardenName:'Front Yard', widthFt:15, heightFt:20 },
  mode: 'view',
  filters: { types:null, species:null, bloomFrom:null, bloomTo:null,
             autumn:false, winterInt:false, nativeOnly:false,
             sun:null, water:null, statusEx:true, statusPr:true },
  selId: null, pendingPt: null, editingId: null,
  undoStack: [],
};

// ─────────────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────────────
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({catalog:S.catalog,layout:S.layout,meta:S.meta})); } catch(e){}
}
function loadSaved() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');
    if(d&&d.catalog&&d.catalog.length){ S.catalog=d.catalog; S.layout=d.layout; S.meta=d.meta||S.meta; return true; }
  } catch(e){}
  return false;
}
function migrate() {
  // Add status:'existing' to any layout entry missing it
  S.layout.forEach(i => { if(!i.status) i.status = 'existing'; });
  // Fix winterInterest for known-evergreen plants that may have old 'none' value in localStorage
  const evIds = new Set(['p04','p07','p36','p40']);
  S.catalog.forEach(p => { if(evIds.has(p.id) && p.winterInterest==='none') p.winterInterest='evergreen'; });
  save();
}

// GITHUB SYNC
// ─────────────────────────────────────────────────────
const GH_OWNER  = 'jzc248';
const GH_REPO   = 'garden';
const GH_BRANCH = 'main';
const GH_FILE   = 'data.json';
const GH_RAW    = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${GH_FILE}`;
const GH_API    = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;

function ghToken() { return localStorage.getItem('garden-gh-token') || ''; }

async function loadFromGithub() {
  try {
    const resp = await fetch(GH_RAW + '?t=' + Date.now());
    if (!resp.ok) return;
    const data = await resp.json();
    if (!data || !data.catalog || !data.layout) return;
    S.catalog = data.catalog;
    S.layout  = data.layout;
    if (data.meta) S.meta = data.meta;
    save();
    migrate();
    S.catalog.forEach(p => { if (!PLANT_DB.find(d => d.name === p.name)) PLANT_DB.push(p); });
    buildFilterUI();
    renderAll();
  } catch(e) { /* offline or no data.json yet — silently ignore */ }
}

async function saveToGithub() {
  const pw = prompt('Enter password to save:');
  if(pw !== EDIT_PASSWORD) {
    if(pw !== null) alert('Incorrect password.');
    return;
  }

  let token = ghToken();
  if (!token) {
    token = prompt('Enter your GitHub Personal Access Token\n(saved locally in this browser only — never in the code):');
    if (!token) return;
    localStorage.setItem('garden-gh-token', token.trim());
    token = token.trim();
  }

  const btn = document.getElementById('gh-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = '☁️ Saving…'; }

  try {
    const data    = { catalog: S.catalog, layout: S.layout, meta: S.meta, saved: new Date().toISOString() };
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));

    // Get current file SHA — required by GitHub API to update an existing file
    let sha = null;
    const getResp = await fetch(GH_API, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (getResp.ok) { sha = (await getResp.json()).sha; }

    const body = {
      message: `Garden update ${new Date().toISOString().slice(0,16).replace('T',' ')}`,
      content,
      branch: GH_BRANCH
    };
    if (sha) body.sha = sha;

    const putResp = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (putResp.ok) {
      if (btn) { btn.textContent = '☁️ Saved!'; setTimeout(() => { btn.textContent = '☁️ Save to GitHub'; btn.disabled = false; }, 2500); }
    } else if (putResp.status === 401) {
      localStorage.removeItem('garden-gh-token');
      alert('Token rejected — your token has been cleared. Please try again with a valid token.');
      if (btn) { btn.textContent = '☁️ Save to GitHub'; btn.disabled = false; }
    } else {
      const err = await putResp.json().catch(() => ({}));
      alert('Save failed (' + putResp.status + '): ' + (err.message || 'unknown error'));
      if (btn) { btn.textContent = '☁️ Save to GitHub'; btn.disabled = false; }
    }
  } catch(e) {
    alert('Save failed: ' + e.message);
    if (btn) { btn.textContent = '☁️ Save to GitHub'; btn.disabled = false; }
  }
}

// HELPERS
// ─────────────────────────────────────────────────────
const plant = id => S.catalog.find(p=>p.id===id);
const inst  = id => S.layout.find(i=>i.id===id);
const uid   = pfx=> pfx+(Date.now().toString(36)+Math.random().toString(36).slice(2,5));
const hmIdx = s => HALF_MONTHS.indexOf(s);

function bloomOverlap(p, fromIdx, toIdx) {
  if(!p.bloomStart||!p.bloomEnd) return false;
  const s=hmIdx(p.bloomStart), e=hmIdx(p.bloomEnd);
  if(s<0||e<0) return false;
  const fS = fromIdx??0, fE = toIdx??23;
  // handle wrap-around (e.g. Dec-Feb)
  const pRange = s<=e ? {s,e} : null;
  const fRange = fS<=fE ? {s:fS,e:fE} : null;
  if(pRange&&fRange) return pRange.s<=fRange.e && pRange.e>=fRange.s;
  // simplified: just check containment
  if(s<=e) return fS<=e&&fE>=s;
  return fS<=e||fE>=s;
}

function visible(i) {
  const p=plant(i.plantId); if(!p) return false;
  const f=S.filters;
  if(f.types   && !f.types.has(p.type)) return false;
  if(f.species && !f.species.has(i.plantId)) return false;
  if(f.bloomFrom!==null||f.bloomTo!==null) {
    if(!bloomOverlap(p,f.bloomFrom,f.bloomTo)) return false;
  }
  if(f.autumn    && p.autumnFoliage!=='yes') return false;
  if(f.winterInt && p.winterInterest==='none') return false;
  if(f.nativeOnly && !p.native) return false;
  if(f.sun   && !f.sun.has(p.sunNeeds))   return false;
  if(f.water && !f.water.has(p.waterNeeds)) return false;
  const status = i.status||'existing';
  if(!f.statusEx && status==='existing')    return false;
  if(!f.statusPr && status==='prospective') return false;
  return true;
}

function svgPt(clientX,clientY) {
  const svg=document.getElementById('map-svg');
  const p=svg.createSVGPoint(); p.x=clientX; p.y=clientY;
  return p.matrixTransform(svg.getScreenCTM().inverse());
}

function renderAll() {

function renderPlants() {
  const gP = document.getElementById('plants-g');
  const gL = document.getElementById('labels-g');
  gP.innerHTML=''; gL.innerHTML='';

  S.layout.forEach(i => {
    const p = plant(i.plantId); if(!p) return;
    const col   = TYPE_COLOR[p.type]||'#888';
    const isEmpty = EMPTY_FILL.has(p.type);
    const isDash  = DASHED_BORDER.has(p.type);
    const vis     = visible(i);

    // Ellipse
    const el = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    el.setAttribute('cx', i.cx);
    el.setAttribute('cy', i.cy);
    el.setAttribute('rx', i.wFt/2);
    el.setAttribute('ry', i.hFt/2);
    el.setAttribute('fill',         isEmpty ? '#ffffff' : col);
    el.setAttribute('fill-opacity', isEmpty ? '0.01'   : (p.type==='groundcover'?'0.50':'0.65'));
    el.setAttribute('stroke',       col);
    el.setAttribute('stroke-width', '0.05');
    if(isDash) el.setAttribute('stroke-dasharray','0.15 0.08');
    el.classList.add('plant-el');
    if(!vis)        el.classList.add('dimmed');
    if(i.id===S.selId) el.classList.add('selected');
    el.dataset.id = i.id;
    el.addEventListener('click',      ev=>{ ev.stopPropagation(); onPlantClick(i.id); });
    el.addEventListener('touchstart', onTouchStart, {passive:false});
    gP.appendChild(el);

    // Label — genus name at fixed visual size (inverse-scaled with zoom)
    const fontSize = BASE_LABEL / VB.scale;
    const name = p.name.split(' ')[0];
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', i.cx);
    txt.setAttribute('y', i.cy);
    txt.setAttribute('font-size',         fontSize);
    txt.setAttribute('font-family',       "'Helvetica Neue', Helvetica, Arial, sans-serif");
    txt.setAttribute('font-weight',       '600');
    txt.setAttribute('text-anchor',       'middle');
    txt.setAttribute('dominant-baseline', 'central');
    txt.setAttribute('fill',   isEmpty ? col : '#fff');
    txt.setAttribute('stroke', isEmpty ? '#fff' : '#1a1a1a');
    txt.setAttribute('stroke-width', fontSize*0.14);
    txt.setAttribute('paint-order',  'stroke fill');
    txt.classList.add('plant-label');
    if(!vis) txt.classList.add('dimmed');
    txt.dataset.id = i.id;
    txt.style.pointerEvents='none';
    txt.textContent = name;
    gL.appendChild(txt);
  });
}

function buildFilterUI() {
  // Type checkboxes
  const typesPresent = [...new Set(S.layout.map(i=>{const p=plant(i.plantId);return p?p.type:null}).filter(Boolean))].sort();
  const typeBox = document.getElementById('type-checks');
  typeBox.innerHTML='';
  typesPresent.forEach(t=>{
    const checked = !S.filters.types || S.filters.types.has(t);
    const row = document.createElement('div'); row.className='fsec-row';
    row.innerHTML=`<label><input type="checkbox" ${checked?'checked':''} data-type="${t}">
      <span class="type-dot" style="background:${TYPE_COLOR[t]||'#888'};${EMPTY_FILL.has(t)?'border:2px solid '+TYPE_COLOR[t]+';background:transparent':''}"></span>
      ${TYPE_LABEL[t]||t}</label>`;
    row.querySelector('input').addEventListener('change', ()=>updateTypeFilter());
    typeBox.appendChild(row);
  });
  document.getElementById('fsec-type-cnt').textContent = `${typesPresent.filter(t=>!S.filters.types||S.filters.types.has(t)).length}/${typesPresent.length}`;

  // Species checkboxes
  buildSpeciesList('');

  // Bloom slider sync
  const bActive = document.getElementById('bloom-active');
  const bSlider = document.getElementById('bloom-slider');
  if(bActive && bSlider) {
    bActive.checked = S.filters.bloomFrom !== null;
    if(S.filters.bloomFrom !== null) bSlider.value = S.filters.bloomFrom;
    updateBloomLabel();
  }

  // Feature checkboxes
  document.getElementById('f-autumn').checked  = S.filters.autumn;
  document.getElementById('f-wi').checked      = S.filters.winterInt;
  document.getElementById('f-native').checked  = S.filters.nativeOnly;
  // Sun
  const allSunVals = ['Full sun','Part sun/shade','Full shade'];
  document.getElementById('f-sun-full').checked  = !S.filters.sun || S.filters.sun.has('Full sun');
  document.getElementById('f-sun-part').checked  = !S.filters.sun || S.filters.sun.has('Part sun/shade');
  document.getElementById('f-sun-shade').checked = !S.filters.sun || S.filters.sun.has('Full shade');
  // Water
  document.getElementById('f-water-low').checked  = !S.filters.water || S.filters.water.has('Low');
  document.getElementById('f-water-med').checked  = !S.filters.water || S.filters.water.has('Medium');
  document.getElementById('f-water-high').checked = !S.filters.water || S.filters.water.has('High');
  // Status
  document.getElementById('f-st-ex').checked = S.filters.statusEx;
  document.getElementById('f-st-pr').checked = S.filters.statusPr;
}

function buildSpeciesList(q) {
  const ql = q.toLowerCase();
  const box = document.getElementById('species-checks');
  box.innerHTML='';
  S.catalog
    .filter(p=>!ql||p.name.toLowerCase().includes(ql)||p.commonName.toLowerCase().includes(ql))
    .sort((a,b)=>a.name.localeCompare(b.name))
    .forEach(p=>{
      const checked = !S.filters.species || S.filters.species.has(p.id);
      const cnt = S.layout.filter(i=>i.plantId===p.id).length;
      const row = document.createElement('div'); row.className='fsec-row';
      row.innerHTML=`<label><input type="checkbox" ${checked?'checked':''} data-pid="${p.id}">
        <span class="type-dot" style="background:${TYPE_COLOR[p.type]||'#888'}"></span>
        <span style="font-style:italic">${p.name}</span> <span style="color:#aaa;font-size:12px">(${cnt})</span></label>`;
      row.querySelector('input').addEventListener('change',()=>updateSpeciesFilter());
      box.appendChild(row);
    });
  const total = S.catalog.length;
  const on = S.filters.species ? [...S.filters.species].length : total;
  document.getElementById('fsec-species-cnt').textContent=`${on}/${total}`;
}

function filterSpeciesList(q) { buildSpeciesList(q); }

function updateTypeFilter() {
  const checks = document.querySelectorAll('#type-checks input[data-type]');
  const allChecked = [...checks].every(c=>c.checked);
  S.filters.types = allChecked ? null : new Set([...checks].filter(c=>c.checked).map(c=>c.dataset.type));
  applyFilters();
  const typesPresent = [...new Set(S.layout.map(i=>{const p=plant(i.plantId);return p?p.type:null}).filter(Boolean))];
  document.getElementById('fsec-type-cnt').textContent = `${typesPresent.filter(t=>!S.filters.types||S.filters.types.has(t)).length}/${typesPresent.length}`;
}
function updateSpeciesFilter() {
  const checks = document.querySelectorAll('#species-checks input[data-pid]');
  // Start from current set (or all IDs) so hidden checkboxes keep their state
  const currentSet = S.filters.species
    ? new Set(S.filters.species)
    : new Set(S.catalog.map(p=>p.id));
  checks.forEach(c => {
    if(c.checked) currentSet.add(c.dataset.pid);
    else currentSet.delete(c.dataset.pid);
  });
  const allOn = S.catalog.every(p=>currentSet.has(p.id));
  S.filters.species = allOn ? null : currentSet;
  applyFilters();
  const total=S.catalog.length, on=S.filters.species?[...S.filters.species].length:total;
  document.getElementById('fsec-species-cnt').textContent=`${on}/${total}`;
}
function setAllTypes(val) {
  document.querySelectorAll('#type-checks input').forEach(c=>{ c.checked=val; });
  updateTypeFilter();
}
function setAllSpecies(val) {
  document.querySelectorAll('#species-checks input').forEach(c=>{ c.checked=val; });
  updateSpeciesFilter();
}
function updateSunFilter() {
  const vals = ['Full sun','Part sun/shade','Full shade'];
  const ids  = ['f-sun-full','f-sun-part','f-sun-shade'];
  const checked = ids.map(id=>document.getElementById(id)?.checked);
  S.filters.sun = checked.every(Boolean) ? null : new Set(vals.filter((_,i)=>checked[i]));
  renderAll();
}
function updateWaterFilter() {
  const vals = ['Low','Medium','High'];
  const ids  = ['f-water-low','f-water-med','f-water-high'];
  const checked = ids.map(id=>document.getElementById(id)?.checked);
  S.filters.water = checked.every(Boolean) ? null : new Set(vals.filter((_,i)=>checked[i]));
  renderAll();
}
function setAllSun(val) {
  ['f-sun-full','f-sun-part','f-sun-shade'].forEach(id=>{ const el=document.getElementById(id); if(el) el.checked=val; });
  updateSunFilter();
}
function setAllWater(val) {
  ['f-water-low','f-water-med','f-water-high'].forEach(id=>{ const el=document.getElementById(id); if(el) el.checked=val; });

}

function updateBloomLabel() {
  const el = document.getElementById('bloom-label');
  const sl = document.getElementById('bloom-slider');
  if(el && sl) el.textContent = HALF_MONTHS[parseInt(sl.value)];

function applyFilters() {
  const bActive = document.getElementById('bloom-active');
  const bSlider = document.getElementById('bloom-slider');
  if(bActive && bActive.checked && bSlider) {
    const v = parseInt(bSlider.value);

  S.filters.statusEx  = document.getElementById('f-st-ex')?.checked??true;

               autumn:false,winterInt:false,nativeOnly:false,

// ─────────────────────────────────────────────────────
// DRAG
// ─────────────────────────────────────────────────────
let _drag=null;

function onTouchStart(ev) {
  if(S.mode!=='edit') return;
  ev.preventDefault();
  const t=ev.touches[0]; const id=ev.currentTarget.dataset.id;
  const i=inst(id); if(!i) return;
  const p=svgPt(t.clientX,t.clientY);
  const snapshot=JSON.parse(JSON.stringify(S.layout));
  _drag={id,ox:i.cx,oy:i.cy,sx:p.x,sy:p.y,moved:false,snapshot};
  ev.currentTarget.classList.add('dragging');
  const onMove=e=>{ e.preventDefault();
    const tt=e.touches[0]; const pp=svgPt(tt.clientX,tt.clientY);
    const dx=pp.x-_drag.sx,dy=pp.y-_drag.sy;
    if(Math.abs(dx)>.08||Math.abs(dy)>.08)_drag.moved=true;
    i.cx=Math.max(-1,Math.min(16,_drag.ox+dx)); i.cy=Math.max(-1,Math.min(21,_drag.oy+dy));
    const el=document.querySelector(`.plant-el[data-id="${id}"]`);
    const lb=document.querySelector(`.plant-label[data-id="${id}"]`);
    if(el){el.setAttribute('cx',i.cx);el.setAttribute('cy',i.cy);}
    if(lb){lb.setAttribute('x',i.cx);lb.setAttribute('y',i.cy);}
  };
  const onEnd=()=>{
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);
    const el=document.querySelector(`.plant-el[data-id="${id}"]`);
    if(el)el.classList.remove('dragging');
    if(_drag.moved) {
      S.undoStack.push(_drag.snapshot);
      if(S.undoStack.length>20) S.undoStack.shift();
      save();
    } else onPlantClick(id);
    _drag=null;
  };
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd);
}

document.getElementById('map-svg').addEventListener('mousedown',ev=>{
  if(S.mode!=='edit')return;
  const el=ev.target.closest('.plant-el');if(!el)return;
  ev.preventDefault();
  const id=el.dataset.id; const i=inst(id); if(!i)return;
  const p=svgPt(ev.clientX,ev.clientY);
  const snapshot=JSON.parse(JSON.stringify(S.layout));
  _drag={id,ox:i.cx,oy:i.cy,sx:p.x,sy:p.y,moved:false,snapshot};
  el.classList.add('dragging');
  const onMove=e=>{
    const pp=svgPt(e.clientX,e.clientY);
    const dx=pp.x-_drag.sx,dy=pp.y-_drag.sy;
    if(Math.abs(dx)>.04||Math.abs(dy)>.04)_drag.moved=true;
    i.cx=Math.max(-1,Math.min(16,_drag.ox+dx)); i.cy=Math.max(-1,Math.min(21,_drag.oy+dy));
    el.setAttribute('cx',i.cx);el.setAttribute('cy',i.cy);
    const lb=document.querySelector(`.plant-label[data-id="${id}"]`);
    if(lb){lb.setAttribute('x',i.cx);lb.setAttribute('y',i.cy);}
  };
  const onUp=()=>{
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    el.classList.remove('dragging');
    if(_drag.moved) {
      S.undoStack.push(_drag.snapshot);
      if(S.undoStack.length>20) S.undoStack.shift();
      save();
    } else onPlantClick(id);
    _drag=null;
  };
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
});

function openPicker() {
  document.getElementById('picker-srch').value='';
  fillPicker('');
  document.getElementById('picker').classList.add('open');
}
function closePicker() {
  document.getElementById('picker').classList.remove('open');
  S.pendingPt=null;
}
function fillPicker(q) {
  const ql=q.toLowerCase();
  const list=document.getElementById('picker-list');
  list.innerHTML='';
  // Merge PLANT_DB with catalog, deduplicated by scientific name
  const seen=new Set();
  const allPlants=[...S.catalog,...PLANT_DB].filter(p=>{
    if(seen.has(p.name)) return false; seen.add(p.name); return true;
  });
  allPlants
    .filter(p=>!ql||p.commonName.toLowerCase().includes(ql)||p.name.toLowerCase().includes(ql))
    .sort((a,b)=>a.commonName.localeCompare(b.commonName))
    .forEach(p=>{
      const col=TYPE_COLOR[p.type]||'#888';
      const div=document.createElement('div');div.className='pitem';
      div.innerHTML=`<div class="pdot" style="background:${col}${EMPTY_FILL.has(p.type)?';border:2px solid '+col+';background:transparent':''}"></div>
        <div><div class="pname">${p.commonName}</div><div class="psci">${p.name}</div></div>`;
      div.onclick=()=>placePlantFromDB(p);
      list.appendChild(div);
    });
}
function placePlantFromDB(p) {
  if(!S.pendingPt) return;
  // If this plant isn't in the catalog yet, add it
  let catalogEntry = S.catalog.find(c=>c.name===p.name);
  if(!catalogEntry) {
    catalogEntry = Object.assign({}, p, {id: uid('p')});
    S.catalog.push(catalogEntry);
  }
  const i={id:uid('i'),plantId:catalogEntry.id,cx:S.pendingPt.x,cy:S.pendingPt.y,wFt:1,hFt:1,status:'existing'};
  S.layout.push(i); S.pendingPt=null;
  closePicker(); save(); renderAll(); onPlantClick(i.id);
}
function placePlant(plantId) {
  if(!S.pendingPt)return;
  const i={id:uid('i'),plantId,cx:S.pendingPt.x,cy:S.pendingPt.y,wFt:1,hFt:1,status:'existing'};
  S.layout.push(i); S.pendingPt=null;
  closePicker(); save(); renderAll(); onPlantClick(i.id);
}

// ─────────────────────────────────────────────────────
// SPECIES FORM  (new + edit)
// ─────────────────────────────────────────────────────
function populateHalfMonthSelects() {
  const bsEl=document.getElementById('sf-bs');
  const beEl=document.getElementById('sf-be');
  if(bsEl.options.length>1)return;
  HALF_MONTHS.forEach(m=>{ bsEl.add(new Option(m,m)); beEl.add(new Option(m,m)); });
}

function showSF(plantId) {
  // plantId=null → new; plantId=string → edit
  S.editingId = plantId;
  populateHalfMonthSelects();
  const isEdit = plantId!==null;
  document.getElementById('sf-title').textContent = isEdit ? 'Edit Species' : 'New Species';
  document.getElementById('sf-save-btn').textContent = isEdit ? 'Save Changes' : 'Save & Place';
  closePicker();

  const p = isEdit ? plant(plantId) : null;
  document.getElementById('sf-common').value = p?.commonName||'';
  document.getElementById('sf-sci').value    = p?.name||'';
  document.getElementById('sf-type').value   = p?.type||'clumping';
  document.getElementById('sf-sun').value    = p?.sunNeeds||'Full sun';
  document.getElementById('sf-water').value  = p?.waterNeeds||'Low';
  document.getElementById('sf-agg').value    = p?.spreadAggression||'Clumping';
  document.getElementById('sf-stype').value  = p?.spreadType||'Clumping';
  document.getElementById('sf-bs').value     = p?.bloomStart||'';
  document.getElementById('sf-be').value     = p?.bloomEnd||'';
  document.getElementById('sf-autumn').value = p?.autumnFoliage||'no';
  document.getElementById('sf-winter').value = p?.winterInterest||'none';
  document.getElementById('sf-soil').value   = p?.soilNotes||'';
  document.getElementById('sf-native').value = p?.native ? 'true' : 'false';
  document.getElementById('sf-notes').value  = p?.notes||'';
  document.getElementById('sf-photo').value  = p?.photoUrl||'';

  document.getElementById('sf-modal').classList.add('open');
}
function closeSF() {
  document.getElementById('sf-modal').classList.remove('open');
  S.editingId=null;
}

// Auto-fill from DB when typing a new species
function autoFill(q,field) {
  if(S.editingId) return; // don't auto-fill when editing
  const ql=q.toLowerCase();
  const allDB=[...PLANT_DB,...S.catalog];
  const match=allDB.find(p=> field==='common'
    ? p.commonName.toLowerCase().startsWith(ql)
    : p.name.toLowerCase().startsWith(ql));
  if(!match)return;
  if(field!=='common') document.getElementById('sf-common').value=match.commonName;
  if(field!=='sci')    document.getElementById('sf-sci').value=match.name;
  document.getElementById('sf-type').value   =match.type||'clumping';
  document.getElementById('sf-sun').value    =match.sunNeeds||'Full sun';
  document.getElementById('sf-water').value  =match.waterNeeds||'Low';
  document.getElementById('sf-agg').value    =match.spreadAggression||'Clumping';
  document.getElementById('sf-stype').value  =match.spreadType||'Clumping';
  document.getElementById('sf-bs').value     =match.bloomStart||'';
  document.getElementById('sf-be').value     =match.bloomEnd||'';
  document.getElementById('sf-autumn').value =match.autumnFoliage||'no';
  document.getElementById('sf-winter').value =match.winterInterest||'none';
  document.getElementById('sf-soil').value   =match.soilNotes||'';
  document.getElementById('sf-native').value =match.native?'true':'false';
  document.getElementById('sf-photo').value  =match.photoUrl||'';
}
document.getElementById('sf-common').addEventListener('input',function(){autoFill(this.value,'common');});
document.getElementById('sf-sci').addEventListener('input',function(){autoFill(this.value,'sci');});

function saveSF() {
  const common=document.getElementById('sf-common').value.trim();
  const sci   =document.getElementById('sf-sci').value.trim();
  if(!common||!sci){alert('Please enter both common name and scientific name.');return;}
  const updates = {
    name:sci, commonName:common,
    type:    document.getElementById('sf-type').value,
    sunNeeds:   document.getElementById('sf-sun').value,
    waterNeeds: document.getElementById('sf-water').value,
    spreadAggression:document.getElementById('sf-agg').value,
    spreadType: document.getElementById('sf-stype').value,
    bloomStart: document.getElementById('sf-bs').value,
    bloomEnd:   document.getElementById('sf-be').value,
    autumnFoliage: document.getElementById('sf-autumn').value,
    winterInterest:document.getElementById('sf-winter').value,
    soilNotes:  document.getElementById('sf-soil').value.trim(),
    native:     document.getElementById('sf-native').value==='true',
    notes:      document.getElementById('sf-notes').value.trim(),
    photoUrl:   document.getElementById('sf-photo').value.trim()||
                `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(sci.replace(/\s+/g,'_'))}.jpg`,
  };

  if(S.editingId) {
    // Edit existing
    const idx=S.catalog.findIndex(p=>p.id===S.editingId);
    if(idx>=0) S.catalog[idx]={...S.catalog[idx],...updates};
    closeSF(); save(); renderAll();
    if(S.selId) showCard(S.selId); // refresh card
  } else {
    // New species
    const p={id:uid('p'),...updates};
    S.catalog.push(p); save();
    closeSF();
    placePlant(p.id);
  }
}

// ─────────────────────────────────────────────────────
// DELETE
// ─────────────────────────────────────────────────────
function deleteInst(id) {
  if(!confirm('Remove this plant from the garden?'))return;
  S.layout=S.layout.filter(i=>i.id!==id);
  S.selId=null; closeAllSheets(); save(); renderAll();
}

// ─────────────────────────────────────────────────────
// UNDO
// ─────────────────────────────────────────────────────
function undo() {
  if(!S.undoStack.length) return;
  S.layout = S.undoStack.pop();
  S.selId = null;
  save(); renderAll();
}

// ─────────────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────────────
function resizeInst(id, dim, val) {
  const i = inst(id); if(!i) return;
  const v = parseFloat(val); if(isNaN(v) || v < 0.2) return;
  if(dim==='w') i.wFt=v; else i.hFt=v;
  renderPlants(); save();
}
function setInstStatus(id, val) {
  const i = inst(id); if(!i) return;
  i.status = val; save();
}

// ─────────────────────────────────────────────────────
// DESKTOP SIDEBAR CARD
// ─────────────────────────────────────────────────────
function buildCardHtml(id) {
  const i=inst(id); if(!i) return '';
  const p=plant(i.plantId); if(!p) return '';
  const col=TYPE_COLOR[p.type]||'#888';
  const segs  = HALF_MONTHS.map((_,mi)=>`<div class="bloom-seg ${bloomOverlap(p,mi,mi)?'on':''}"></div>`).join('');
  const abbrs = MONTHS_SHORT.map(m=>`<div class="bloom-abbr" style="flex:2">${m}</div>`).join('');
  const bloomHtml = p.bloomStart ? `
    <div class="bloom-box">
      <div class="bloom-lbl">🌸 Bloom — ${p.bloomStart}${p.bloomEnd&&p.bloomEnd!==p.bloomStart?' to '+p.bloomEnd:''}</div>
      <div class="bloom-bar">${segs}</div>
      <div class="bloom-abbrs">${abbrs}</div>
    </div>` : '';
  const typeBadge   = `<span class="badge badge-type" style="background:${col}">${TYPE_LABEL[p.type]||p.type}</span>`;
  const nativeBadge = p.native ? `<span class="badge badge-native">🦋 Native</span>` : '';
  const autumnBadge = p.autumnFoliage==='yes' ? `<span class="badge badge-autumn">🍂 Autumn color</span>` : '';
  const winterBadge = p.winterInterest==='evergreen' ? `<span class="badge badge-winter-ev">🌿 Evergreen</span>`
                    : p.winterInterest==='structural' ? `<span class="badge badge-winter-st">❄️ Structural interest</span>` : '';
  return `
    ${p.photoUrl?`<img class="card-photo" src="${p.photoUrl}" alt="${p.commonName}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:``}
    <div class="card-photo-ph" style="display:${p.photoUrl?'none':'flex'}">${TYPE_ICON[p.type]||'🌿'}</div>
    <div class="card-name">${p.commonName}</div>
    <div class="card-sci">${p.name}</div>
    <div class="card-badges">${typeBadge}${nativeBadge}${autumnBadge}${winterBadge}</div>
    <div class="attrs">
      <div class="attr"><div class="attr-lbl">☀️ Sun</div><div class="attr-val">${p.sunNeeds}</div></div>
      <div class="attr"><div class="attr-lbl">💧 Water</div><div class="attr-val">${p.waterNeeds}</div></div>
      <div class="attr"><div class="attr-lbl">🌱 Spread</div><div class="attr-val">${p.spreadAggression}</div></div>
      <div class="attr"><div class="attr-lbl">↔ How</div><div class="attr-val">${p.spreadType}</div></div>
    </div>
    ${p.soilNotes?`<div class="soil-box"><div class="soil-lbl">🪱 Soil</div><div class="soil-val">${p.soilNotes}</div></div>`:''}
    ${bloomHtml}
    ${p.notes?`<div class="card-notes">📝 ${p.notes}</div>`:''}
    ${S.mode==='edit'?`
    <div class="resize-row">
      <label>Width (ft)<input type="number" step="0.1" min="0.2" value="${i.wFt.toFixed(1)}"
        oninput="resizeInst('${i.id}','w',this.value)"></label>
      <label>Height (ft)<input type="number" step="0.1" min="0.2" value="${i.hFt.toFixed(1)}"
        oninput="resizeInst('${i.id}','h',this.value)"></label>
    </div>
    <div class="resize-row" style="margin-top:4px">
      <label style="flex:1">Status
        <select style="margin-top:4px;width:100%;padding:4px 8px;border-radius:6px;border:1px solid #ccc;font-size:13px"
          onchange="setInstStatus('${i.id}',this.value)">
          <option value="existing"     ${(i.status||'existing')==='existing'    ?'selected':''}>Existing</option>
          <option value="prospective"  ${(i.status||'existing')==='prospective' ?'selected':''}>Prospective</option>
        </select>
      </label>
    </div>`:''}
    <div class="card-btns">
      <button class="card-edit-btn" onclick="showSF('${i.plantId}')">✏️ Edit Species</button>
      <button class="card-del-btn"  onclick="deleteInst('${i.id}')">🗑 Remove</button>
    </div>`;
}

function showSidebarFilters() {
  document.getElementById('sidebar-card').style.display = 'none';
  document.getElementById('filter-body').style.display = '';
  document.getElementById('filter-sheet').querySelector('.sheet-hdr').style.display = '';
  S.selId = null;
  renderPlants();
}

// ─────────────────────────────────────────────────────
// SWIPE-TO-DISMISS
// ─────────────────────────────────────────────────────
function addSwipeDismiss(sheetEl, closeFn) {
  let startY=0, curY=0, active=false;
  sheetEl.addEventListener('touchstart', ev=>{
    if(window.innerWidth >= 900) return;
    const body = sheetEl.querySelector('.sheet-body');
    if(body && body.scrollTop > 0) return;
    startY = ev.touches[0].clientY; curY = startY; active = true;
    sheetEl.style.transition = 'none';
  }, {passive:true});
  sheetEl.addEventListener('touchmove', ev=>{
    if(!active) return;
    curY = ev.touches[0].clientY;
    const dy = Math.max(0, curY - startY);
    sheetEl.style.transform = `translateY(${dy}px)`;
  }, {passive:true});
  sheetEl.addEventListener('touchend', ()=>{
    if(!active) return; active = false;
    const dy = Math.max(0, curY - startY);
    sheetEl.style.transition = '';
    if(dy > 80) { sheetEl.style.transform=''; closeFn(); }
    else sheetEl.style.transform = '';
  });
}

// ─────────────────────────────────────────────────────
// EXPORT / IMPORT
// ─────────────────────────────────────────────────────
function exportData() {
  const data = {catalog:S.catalog, layout:S.layout, meta:S.meta, exported:new Date().toISOString()};
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'garden-data.json';
  a.click(); URL.revokeObjectURL(a.href);
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const fr = new FileReader();
    fr.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if(!d.catalog||!d.layout) throw new Error('Invalid format');
        S.catalog=d.catalog; S.layout=d.layout;
        if(d.meta) S.meta=d.meta;
        save(); renderAll(); buildFilterUI();
        alert('Garden data imported!');
      } catch(err) { alert('Import error: '+err.message); }
    };
    fr.readAsText(e.target.files[0]);
  };
  input.click();
}

// ─────────────────────────────────────────────────────
// ZOOM / PAN
// ─────────────────────────────────────────────────────
function initGrid() {
  const g = document.getElementById('grid-g');
  const ns = 'http://www.w3.org/2000/svg';
  const W = 15, H = 20;
  for(let x = 0; x <= W; x++) {
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', x); line.setAttribute('y1', 0);
    line.setAttribute('x2', x); line.setAttribute('y2', H);
    line.setAttribute('stroke', x===0||x===W ? '#6a9a6a' : '#aac8aa');
    line.setAttribute('stroke-width', x===0||x===W ? '0.04' : '0.02');
    line.setAttribute('stroke-dasharray', x===0||x===W ? '' : '0.15 0.1');
    g.appendChild(line);
  }
  for(let y = 0; y <= H; y++) {
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', 0); line.setAttribute('y1', y);
    line.setAttribute('x2', W); line.setAttribute('y2', y);
    line.setAttribute('stroke', y===0||y===H ? '#6a9a6a' : '#aac8aa');
    line.setAttribute('stroke-width', y===0||y===H ? '0.04' : '0.02');
    line.setAttribute('stroke-dasharray', y===0||y===H ? '' : '0.15 0.1');
    g.appendChild(line);
  }
}
let _gridOn = false;
function toggleGrid() {
  _gridOn = !_gridOn;
  document.getElementById('grid-g').style.display = _gridOn ? '' : 'none';
  document.getElementById('grid-btn').style.opacity = _gridOn ? '1' : '0.5';
}

function initZoomPan() {
  const svg  = document.getElementById('map-svg');
  const wrap = document.getElementById('map-wrap');

  // ── Mouse wheel zoom (desktop) ──
  wrap.addEventListener('wheel', ev => {
    ev.preventDefault();
    const factor = ev.deltaY < 0 ? 1.14 : 1/1.14;
    const newScale = Math.max(0.6, Math.min(12, VB.scale * factor));
    const pt = svgPt(ev.clientX, ev.clientY);
    const sf = newScale / VB.scale;
    VB.cx = pt.x + (VB.cx - pt.x) / sf;
    VB.cy = pt.y + (VB.cy - pt.y) / sf;
    VB.scale = newScale;
    clampView(); updateViewBox();
  }, {passive:false});

  // ── Double-click to reset (desktop) ──
  wrap.addEventListener('dblclick', ev => {
    if(!ev.target.closest('.plant-el')) {
      VB.cx=7.5; VB.cy=10; VB.scale=1; updateViewBox();
    }
  });

  // ── Touch: pinch zoom + single-finger pan (view mode) ──
  svg.addEventListener('touchstart', ev => {
    if(ev.touches.length === 2) {
      ev.preventDefault();
      const t0=ev.touches[0], t1=ev.touches[1];
      _pinch = {
        dist: Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY),
        scale: VB.scale, cx: VB.cx, cy: VB.cy,
        mx: (t0.clientX+t1.clientX)/2, my: (t0.clientY+t1.clientY)/2,
      };
      _mapPan = null;
    } else if(ev.touches.length === 1) {
      const now = Date.now();
      if(now - _lastTap < 300 && !ev.target.closest('.plant-el')) {
        VB.cx=7.5; VB.cy=10; VB.scale=1; updateViewBox();
      }
      _lastTap = now;
      if(S.mode !== 'edit' && !ev.target.closest('.plant-el')) {
        ev.preventDefault();
        const rect = svg.getBoundingClientRect();
        _mapPan = {
          clientX: ev.touches[0].clientX, clientY: ev.touches[0].clientY,
          cx: VB.cx, cy: VB.cy,
          sx: (VB.W/VB.scale) / rect.width,
          sy: (VB.H/VB.scale) / rect.height,
        };
      }
    }
  }, {passive:false});

  svg.addEventListener('touchmove', ev => {
    if(ev.touches.length === 2 && _pinch) {
      ev.preventDefault();
      const t0=ev.touches[0], t1=ev.touches[1];
      const dist = Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
      const newScale = Math.max(0.6, Math.min(12, _pinch.scale * dist/_pinch.dist));
      const midSvg = svgPt(_pinch.mx, _pinch.my);
      const sf = newScale / VB.scale;
      VB.cx = midSvg.x + (VB.cx - midSvg.x) / sf;
      VB.cy = midSvg.y + (VB.cy - midSvg.y) / sf;
      VB.scale = newScale;
      clampView(); updateViewBox();
    } else if(ev.touches.length === 1 && _mapPan) {
      ev.preventDefault();
      const dx = ev.touches[0].clientX - _mapPan.clientX;
      const dy = ev.touches[0].clientY - _mapPan.clientY;
      VB.cx = _mapPan.cx - dx * _mapPan.sx;
      VB.cy = _mapPan.cy - dy * _mapPan.sy;
      clampView(); updateViewBox();
    }
  }, {passive:false});

  svg.addEventListener('touchend', ev => {
    if(ev.touches.length < 2) _pinch = null;
    if(ev.touches.length === 0) _mapPan = null;
  });

  // ── Mouse pan (view mode, desktop) ──
  let _mousePan = null;
  svg.addEventListener('mousedown', ev => {
    if(S.mode !== 'edit' && !ev.target.closest('.plant-el') && ev.button === 0) {
      ev.preventDefault();
      const rect = svg.getBoundingClientRect();
      _mousePan = {
        clientX: ev.clientX, clientY: ev.clientY,
        cx: VB.cx, cy: VB.cy,
        sx: (VB.W/VB.scale) / rect.width,
        sy: (VB.H/VB.scale) / rect.height,
      };
      svg.style.cursor = 'grabbing';
    }
  });
  window.addEventListener('mousemove', ev => {
    if(!_mousePan) return;
    const dx = ev.clientX - _mousePan.clientX;
    const dy = ev.clientY - _mousePan.clientY;
    VB.cx = _mousePan.cx - dx * _mousePan.sx;
    VB.cy = _mousePan.cy - dy * _mousePan.sy;
    clampView(); updateViewBox();
  });
  window.addEventListener('mouseup', () => {
    if(_mousePan) { _mousePan = null; svg.style.cursor = ''; }
  });
}

// ─────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────
function init() {
  if(!loadSaved()) {
    S.catalog=JSON.parse(JSON.stringify(INIT_CATALOG));
    S.layout =JSON.parse(JSON.stringify(INIT_LAYOUT));
    save();
  }
  migrate();
  initGrid();
  // Merge catalog into DB for auto-fill
  S.catalog.forEach(p=>{ if(!PLANT_DB.find(d=>d.name===p.name)) PLANT_DB.push(p); });
  buildFilterUI();
  renderAll();
  initZoomPan();
  addSwipeDismiss(document.getElementById('info-sheet'), ()=>{ closeSheet('info-sheet'); deselectAll(); });
  addSwipeDismiss(document.getElementById('filter-sheet'), ()=>closeSheet('filter-sheet'));
  addSwipeDismiss(document.getElementById('picker-inner'), ()=>closePicker());
  loadFromGithub(); // silently fetch latest cloud data in background
}
init();
</script>
